server {
    listen 80;
    server_name assistant.example.com;

    # Terminate TLS at the load balancer or replace this file with a 443 server block.
    # Keep the public path aligned with AI_ASSISTANT_CONTEXT_PATH.
    location /ai-assistant/ {
        proxy_pass http://127.0.0.1:8080/ai-assistant/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Required for SSE streaming endpoints.
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    location /actuator/health {
        proxy_pass http://127.0.0.1:8080/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/info {
        proxy_pass http://127.0.0.1:8080/actuator/info;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Do not expose other actuator endpoints by default.
    location /actuator/ {
        return 404;
    }
}

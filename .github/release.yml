changelog:
  categories:
    - title: "🚀 New Features"
      labels: ["feature", "enhancement"]
    - title: "🐛 Bug Fixes"
      labels: ["bug", "fix"]
    - title: "🔒 Security"
      labels: ["security"]
    - title: "⚡ Performance"
      labels: ["performance"]
    - title: "📖 Documentation"
      labels: ["documentation"]
    - title: "🧪 Tests"
      labels: ["test"]
    - title: "🔧 Infrastructure"
      labels: ["ci", "build", "infra"]
    - title: "Other Changes"
      labels: ["*"]
  exclude:
    labels: ["skip-changelog"]

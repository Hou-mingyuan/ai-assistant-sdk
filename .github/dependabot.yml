version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: maven
    directory: /ai-assistant-server
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      maven-server-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: maven
    directory: /ai-assistant-service
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      maven-service-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: maven
    directory: /ai-assistant-client
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      maven-client-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /ai-assistant-ui
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      npm-ui-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      npm-docs-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

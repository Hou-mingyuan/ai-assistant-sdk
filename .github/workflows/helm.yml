name: Helm

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - ".github/workflows/helm.yml"
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - ".github/workflows/helm.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint helm/ai-assistant

      - name: Render default template
        run: helm template ai-assistant helm/ai-assistant

      - name: Render ingress and autoscaling template
        run: |
          helm template ai-assistant helm/ai-assistant \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set secrets.apiKey=ci-placeholder

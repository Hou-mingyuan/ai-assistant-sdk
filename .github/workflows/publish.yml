name: Publish Packages and Images

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ai-assistant-service

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-assistant-ui
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-maven:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-assistant-server
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta-vars
        shell: bash
        run: |
          version="$(awk '
            /<artifactId>ai-assistant-service<\/artifactId>/ { in_project = 1; next }
            in_project && /<version>/ {
              gsub(/.*<version>|<\/version>.*/, "")
              print
              exit
            }
          ' ai-assistant-service/pom.xml)"
          if [ -z "${version}" ]; then
            echo "Failed to resolve ai-assistant-service version" >&2
            exit 1
          fi
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"
          echo "created=${created}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GHCR Docker metadata
        id: ghcr-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.meta-vars.outputs.owner_lc }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=${{ steps.meta-vars.outputs.version }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.ghcr-meta.outputs.tags }}
          labels: ${{ steps.ghcr-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta-vars.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta-vars.outputs.created }}

  smoke-published-image:
    name: Smoke test published GHCR image
    runs-on: ubuntu-latest
    needs: publish-docker
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR image
        id: image
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="${REGISTRY}/${owner_lc}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          for attempt in {1..12}; do
            if docker pull "${{ steps.image.outputs.image }}"; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Run published image
        run: |
          docker run -d \
            --name ai-assistant-service-published \
            --read-only \
            --tmpfs /tmp \
            --security-opt no-new-privileges:true \
            -p 18081:8080 \
            -e AI_ASSISTANT_API_KEY=ci-placeholder \
            -e AI_ASSISTANT_PROVIDER=ollama \
            -e AI_ASSISTANT_ACCESS_TOKEN=ci-token \
            "${{ steps.image.outputs.image }}"

      - name: Smoke test published image
        env:
          AI_ASSISTANT_SMOKE_ATTEMPTS: 30
          AI_ASSISTANT_SMOKE_RETRY_DELAY_MS: 2000
        run: node scripts/smoke-standalone-service.mjs http://localhost:18081/ai-assistant ci-token

      - name: Show container logs
        if: failure()
        run: docker logs ai-assistant-service-published || true

      - name: Clean up container
        if: always()
        run: docker rm -f ai-assistant-service-published || true

  publish-dockerhub:
    name: Publish Docker Hub image
    runs-on: ubuntu-latest
    needs: smoke-published-image
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta-vars
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          version="$(awk '
            /<artifactId>ai-assistant-service<\/artifactId>/ { in_project = 1; next }
            in_project && /<version>/ {
              gsub(/.*<version>|<\/version>.*/, "")
              print
              exit
            }
          ' ai-assistant-service/pom.xml)"
          if [ -z "${version}" ]; then
            echo "Failed to resolve ai-assistant-service version" >&2
            exit 1
          fi
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "created=${created}" >> "${GITHUB_OUTPUT}"

      - name: Resolve Docker Hub repository
        id: dockerhub-vars
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          repository="${DOCKERHUB_REPOSITORY:-${DOCKERHUB_USERNAME}/${IMAGE_NAME}}"
          repository="$(echo "${repository}" | tr '[:upper:]' '[:lower:]')"
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        id: dockerhub-meta
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.dockerhub-vars.outputs.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=${{ steps.meta-vars.outputs.version }}

      - name: Build and push Docker Hub image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.dockerhub-meta.outputs.tags }}
          labels: ${{ steps.dockerhub-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta-vars.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta-vars.outputs.created }}

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/workflows/docs.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check standalone smoke script syntax
        run: node --check scripts/smoke-standalone-service.mjs

      - name: Check package version consistency
        run: node scripts/check-version-consistency.mjs

      - name: Validate docker compose files
        env:
          AI_ASSISTANT_API_KEY: ci-placeholder
          AI_ASSISTANT_ACCESS_TOKEN: ci-token
          AI_ASSISTANT_ALLOWED_ORIGINS: https://example.com
        run: |
          docker compose config >/dev/null
          docker compose -f docker-compose.ghcr.yml config >/dev/null
          docker compose -f docker-compose.prod.yml config >/dev/null

  backend:
    name: Backend (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17]

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -B compile -f ai-assistant-server/pom.xml

      - name: Spotless format check
        run: mvn -B spotless:check -f ai-assistant-server/pom.xml

      - name: Test + JaCoCo coverage
        run: mvn -B test jacoco:report -f ai-assistant-server/pom.xml

      - name: Checkstyle
        run: mvn -B checkstyle:check -f ai-assistant-server/pom.xml

      - name: Coverage gate (verify)
        run: mvn -B verify -DskipTests -f ai-assistant-server/pom.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: ai-assistant-server/target/site/jacoco/
          retention-days: 14

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-assistant-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ai-assistant-ui

      - name: ESLint
        run: npm run lint
        working-directory: ai-assistant-ui

      - name: Prettier format check
        run: npm run format:check
        working-directory: ai-assistant-ui

      - name: Type check + Build
        run: npm run build:lib
        working-directory: ai-assistant-ui

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: ai-assistant-ui

      - name: Build Web Component
        run: npm run build:wc
        working-directory: ai-assistant-ui

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: ai-assistant-ui/coverage/
          retention-days: 14

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ai-assistant-ui/package-lock.json
            e2e/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ai-assistant-ui

      - name: Build UI package for playground
        run: npm run build:lib
        working-directory: ai-assistant-ui

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        run: npm test
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build documentation site
        run: npm run build
        working-directory: docs

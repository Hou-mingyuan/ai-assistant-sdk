version: "3.9"

services:
  ai-assistant:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY}
      - AI_ASSISTANT_PROVIDER=${AI_ASSISTANT_PROVIDER:-openai}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL:-gpt-4o}
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

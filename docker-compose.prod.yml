services:
  ai-assistant:
    image: ${AI_ASSISTANT_IMAGE:-ghcr.io/hou-mingyuan/ai-assistant-service}:${AI_ASSISTANT_IMAGE_TAG:-latest}
    ports:
      - "${AI_ASSISTANT_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8080}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY:?AI_ASSISTANT_API_KEY is required}
      - AI_ASSISTANT_PROVIDER=${AI_ASSISTANT_PROVIDER:-openai}
      - AI_ASSISTANT_BASE_URL=${AI_ASSISTANT_BASE_URL:-}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL:-}
      - AI_ASSISTANT_CONTEXT_PATH=${AI_ASSISTANT_CONTEXT_PATH:-/ai-assistant}
      - AI_ASSISTANT_ACCESS_TOKEN=${AI_ASSISTANT_ACCESS_TOKEN:?AI_ASSISTANT_ACCESS_TOKEN is required in production}
      - AI_ASSISTANT_ALLOWED_ORIGINS=${AI_ASSISTANT_ALLOWED_ORIGINS:?AI_ASSISTANT_ALLOWED_ORIGINS is required in production}
      - AI_ASSISTANT_RATE_LIMIT=${AI_ASSISTANT_RATE_LIMIT:-60}
      - AI_ASSISTANT_TIMEOUT_SECONDS=${AI_ASSISTANT_TIMEOUT_SECONDS:-60}
      - AI_ASSISTANT_MAX_TOKENS=${AI_ASSISTANT_MAX_TOKENS:-2048}
      - AI_ASSISTANT_TEMPERATURE=${AI_ASSISTANT_TEMPERATURE:-0.7}
      - AI_ASSISTANT_LLM_MAX_RETRIES=${AI_ASSISTANT_LLM_MAX_RETRIES:-2}
      - AI_ASSISTANT_ALLOW_QUERY_TOKEN_AUTH=false
      - AI_ASSISTANT_WEBSOCKET_ENABLED=${AI_ASSISTANT_WEBSOCKET_ENABLED:-false}
      - AI_ASSISTANT_ADMIN_ENABLED=${AI_ASSISTANT_ADMIN_ENABLED:-false}
      - AI_ASSISTANT_CONNECTOR_MANAGEMENT_ENABLED=${AI_ASSISTANT_CONNECTOR_MANAGEMENT_ENABLED:-false}
      - AI_ASSISTANT_MCP_SERVER_ENABLED=${AI_ASSISTANT_MCP_SERVER_ENABLED:-false}
      - AI_ASSISTANT_RAG_ENABLED=${AI_ASSISTANT_RAG_ENABLED:-false}
      - AI_ASSISTANT_PII_MASKING_ENABLED=${AI_ASSISTANT_PII_MASKING_ENABLED:-true}
      - AI_ASSISTANT_HEADLESS_FETCH_ENABLED=${AI_ASSISTANT_HEADLESS_FETCH_ENABLED:-false}
      - AI_ASSISTANT_URL_FETCH_ENABLED=${AI_ASSISTANT_URL_FETCH_ENABLED:-true}
      - AI_ASSISTANT_URL_FETCH_SSRF_PROTECTION=${AI_ASSISTANT_URL_FETCH_SSRF_PROTECTION:-true}
      - AI_ASSISTANT_FILE_MAX_EXTRACTED_CHARS=${AI_ASSISTANT_FILE_MAX_EXTRACTED_CHARS:-300000}
      - AI_ASSISTANT_EXPORT_MAX_MESSAGES=${AI_ASSISTANT_EXPORT_MAX_MESSAGES:-2000}
      - AI_ASSISTANT_EXPORT_MAX_TOTAL_CHARS=${AI_ASSISTANT_EXPORT_MAX_TOTAL_CHARS:-2000000}
      - AI_ASSISTANT_EXPORT_MAX_IMAGE_BYTES=${AI_ASSISTANT_EXPORT_MAX_IMAGE_BYTES:-3000000}
      - AI_ASSISTANT_EXPORT_MAX_IMAGE_URLS=${AI_ASSISTANT_EXPORT_MAX_IMAGE_URLS:-64}
      - AI_ASSISTANT_CHAT_MAX_TOTAL_CHARS=${AI_ASSISTANT_CHAT_MAX_TOTAL_CHARS:-300000}
      - AI_ASSISTANT_CHAT_HISTORY_MAX_CHARS=${AI_ASSISTANT_CHAT_HISTORY_MAX_CHARS:-48000}
      - AI_ASSISTANT_MULTIPART_MAX_FILE_SIZE=${AI_ASSISTANT_MULTIPART_MAX_FILE_SIZE:-10MB}
      - AI_ASSISTANT_MULTIPART_MAX_REQUEST_SIZE=${AI_ASSISTANT_MULTIPART_MAX_REQUEST_SIZE:-10MB}
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,info}
      - MANAGEMENT_INFO_ENV_ENABLED=${MANAGEMENT_INFO_ENV_ENABLED:-false}
      - SERVER_SHUTDOWN=${SERVER_SHUTDOWN:-graceful}
      - SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE=${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:-20s}
      - JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:+ExitOnOutOfMemoryError}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://localhost:$${SERVER_PORT:-8080}$${AI_ASSISTANT_CONTEXT_PATH:-/ai-assistant}/health\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: ${AI_ASSISTANT_STOP_GRACE_PERIOD:-30s}
    mem_limit: ${AI_ASSISTANT_MEMORY_LIMIT:-768m}
    cpus: ${AI_ASSISTANT_CPUS:-1.0}
    logging:
      driver: json-file
      options:
        max-size: ${AI_ASSISTANT_LOG_MAX_SIZE:-10m}
        max-file: ${AI_ASSISTANT_LOG_MAX_FILE:-3}
    restart: unless-stopped

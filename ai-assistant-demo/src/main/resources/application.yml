server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ai-assistant:
  # Google Gemini（OpenAI 兼容层），文档：https://ai.google.dev/gemini-api/docs/openai
  # 在 Google AI Studio 创建 API Key：必须通过环境变量 GEMINI_API_KEY 注入（勿将真实密钥写入仓库）
  provider: openai
  base-url: https://generativelanguage.googleapis.com/v1beta/openai
  api-key: ${GEMINI_API_KEY}
  # 须与官方列出的模型 ID 完全一致；错名会 400。示例见文档 gemini-3-flash-preview
  model: gemini-3.1-flash-lite-preview
  # 其它可选：火山方舟（model 须为 ep- 接入点 ID）
  # provider: volcengine
  # api-key: ${ARK_API_KEY:}
  # model: ep-your-endpoint-id
  # base-url: https://ark.cn-beijing.volces.com/api/v3
  # system-prompt: "你是一个专业的AI助手"
  # timeout-seconds: 120
  # rate-limit: 60
  # access-token: my-secret-token
  # allowed-origins: "*"
  # 链接预览接口返回的最大图片条数（默认 10，上限 30）
  # url-preview-max-images: 10
  # 发往模型的 history 正文累计上限（从最新一条往前截断），减轻 tokens / 延迟
  # chat-history-max-chars: 48000
  # PDF 中文：starter 已内置同名字体，一般无需再配；若不用可设 export-pdf-unicode-font: ""

logging:
  level:
    com.aiassistant: DEBUG

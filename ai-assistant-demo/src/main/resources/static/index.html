<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 28px; margin-bottom: 12px; color: #333; }
    p { color: #666; line-height: 1.6; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .card h3 { font-size: 16px; margin-bottom: 8px; color: #333; }
    .card code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.err { background: #ffebee; color: #c62828; }
    #health-status { margin-top: 8px; }
    .test-area { margin-top: 16px; }
    textarea { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; font-size: 14px; resize: vertical; min-height: 80px; }
    button { padding: 8px 20px; border-radius: 8px; border: none; background: #6366f1; color: #fff; cursor: pointer; font-size: 14px; margin-top: 8px; margin-right: 8px; }
    button:hover { background: #4f46e5; }
    #result { margin-top: 12px; padding: 12px; background: #fafafa; border-radius: 8px; min-height: 40px; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Assistant SDK Demo</h1>
    <p>这是一个验证页面，用于测试后端接口是否正常工作。</p>
    <p style="margin-bottom:16px"><a href="/assistant-demo.html" style="color:#4f46e5">→ 打开带 Vue 助手的页面（可摘要当前页 DOM）</a></p>

    <div class="card">
      <h3>Health Check</h3>
      <div id="health-status">Checking...</div>
    </div>

    <div class="card">
      <h3>API Test</h3>
      <div class="test-area">
        <textarea id="input" placeholder="输入文字进行测试...">Hello, how are you?</textarea>
        <div>
          <button onclick="testApi('chat')">Chat</button>
          <button onclick="testApi('translate')">Translate to Chinese</button>
          <button onclick="testApi('summarize')">Summarize</button>
        </div>
        <div id="result"></div>
      </div>
    </div>

    <div class="card">
      <h3>Stats</h3>
      <div id="stats">Loading...</div>
    </div>
  </div>

  <script>
    async function checkHealth() {
      try {
        const res = await fetch('/ai-assistant/health');
        const data = await res.json();
        document.getElementById('health-status').innerHTML = data.success
          ? '<span class="status ok">OK - ' + data.result + '</span>'
          : '<span class="status err">FAIL</span>';
      } catch (e) {
        document.getElementById('health-status').innerHTML = '<span class="status err">ERROR: ' + e.message + '</span>';
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/ai-assistant/stats');
        const data = await res.json();
        document.getElementById('stats').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('stats').textContent = 'Error: ' + e.message;
      }
    }

    async function testApi(action) {
      const text = document.getElementById('input').value.trim();
      if (!text) return;
      const resultEl = document.getElementById('result');
      resultEl.textContent = 'Loading...';

      try {
        const res = await fetch('/ai-assistant/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, text, targetLang: 'zh' }),
        });
        const data = await res.json();
        resultEl.textContent = data.success ? data.result : 'Error: ' + data.error;
        loadStats();
      } catch (e) {
        resultEl.textContent = 'Error: ' + e.message;
      }
    }

    checkHealth();
    loadStats();
  </script>
</body>
</html>
